<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ed760;stop-opacity:1" />
    </linearGradient>
    
    <!-- Flower Gradient -->
    <linearGradient id="flowerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Music Note Gradient -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />
  
  <!-- Animated Blooming Flower -->
  <g transform="translate(256, 280)">
    <!-- Flower Petals with Animation -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
      
      <!-- Petal 1 -->
      <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#flowerGrad)" opacity="0.9">
        <animate attributeName="ry" values="50;55;50" dur="3s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Petal 2 -->
      <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#flowerGrad)" opacity="0.9" transform="rotate(60)">
        <animate attributeName="ry" values="50;55;50" dur="3s" begin="0.5s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Petal 3 -->
      <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#flowerGrad)" opacity="0.9" transform="rotate(120)">
        <animate attributeName="ry" values="50;55;50" dur="3s" begin="1s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Petal 4 -->
      <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#flowerGrad)" opacity="0.9" transform="rotate(180)">
        <animate attributeName="ry" values="50;55;50" dur="3s" begin="1.5s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Petal 5 -->
      <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#flowerGrad)" opacity="0.9" transform="rotate(240)">
        <animate attributeName="ry" values="50;55;50" dur="3s" begin="2s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Petal 6 -->
      <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#flowerGrad)" opacity="0.9" transform="rotate(300)">
        <animate attributeName="ry" values="50;55;50" dur="3s" begin="2.5s" repeatCount="indefinite" />
      </ellipse>
    </g>
    
    <!-- Flower Center -->
    <circle cx="0" cy="0" r="20" fill="#1DB954" />
  </g>
  
  <!-- Animated Music Notes -->
  <g filter="url(#glow)">
    <!-- Music Note 1 - Left -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
      
      <!-- Note Head -->
      <ellipse cx="160" cy="180" rx="22" ry="18" fill="url(#noteGrad)" transform="rotate(-15 160 180)" />
      
      <!-- Note Stem -->
      <rect x="178" y="120" width="5" height="65" fill="url(#noteGrad)" rx="2" />
      
      <!-- Note Flag -->
      <path d="M183 125 Q200 135 195 155" stroke="url(#noteGrad)" stroke-width="4" fill="none" stroke-linecap="round" />
    </g>
    
    <!-- Music Note 2 - Right -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-20;0,0" dur="2.5s" begin="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" begin="0.5s" repeatCount="indefinite" />
      
      <!-- Note Head -->
      <ellipse cx="350" cy="150" rx="20" ry="16" fill="url(#noteGrad)" transform="rotate(10 350 150)" />
      
      <!-- Note Stem -->
      <rect x="332" y="90" width="5" height="65" fill="url(#noteGrad)" rx="2" />
      
      <!-- Note Flag -->
      <path d="M337 95 Q320 105 325 125" stroke="url(#noteGrad)" stroke-width="4" fill="none" stroke-linecap="round" />
    </g>
    
    <!-- Music Note 3 - Top Center (Eighth Note Pair) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="1.8s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" begin="1s" repeatCount="indefinite" />
      
      <!-- Note Head 1 -->
      <ellipse cx="240" cy="120" rx="18" ry="15" fill="url(#noteGrad)" transform="rotate(-5 240 120)" />
      
      <!-- Note Stem 1 -->
      <rect x="255" y="65" width="4" height="60" fill="url(#noteGrad)" rx="2" />
      
      <!-- Note Head 2 -->
      <ellipse cx="280" cy="110" rx="18" ry="15" fill="url(#noteGrad)" transform="rotate(-5 280 110)" />
      
      <!-- Note Stem 2 -->
      <rect x="295" y="55" width="4" height="60" fill="url(#noteGrad)" rx="2" />
      
      <!-- Beam Connecting Notes -->
      <polygon points="255,65 299,55 299,65 255,75" fill="url(#noteGrad)" />
    </g>
  </g>
  
  <!-- Sound Waves Animation -->
  <g opacity="0.3">
    <circle cx="256" cy="256" r="100" fill="none" stroke="#ffffff" stroke-width="2">
      <animate attributeName="r" values="100;150;100" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="r" values="120;180;120" dur="4s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0;0.4" dur="4s" begin="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="1">
      <animate attributeName="r" values="140;200;140" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0;0.3" dur="4s" begin="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- App Name Text -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    SONIC BLOOM
  </text>
</svg>
